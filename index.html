<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="インターバルタイマー">
<title>インターバルタイマー</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #00e5b0;
    --accent2: #ff6b6b;
    --accent3: #ffd93d;
    --text: #e8e8f0;
    --text-dim: #5a5a7a;
    --text-mid: #9898b8;
    --glow: rgba(0, 229, 176, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
    overflow-x: hidden;
    overscroll-behavior: none;
  }

  body {
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,176,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,176,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* Header */
  .header {
    width: 100%;
    padding: 52px 0 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .header-label {
    font-family: 'Courier New', 'SF Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .header-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text);
  }

  /* Clock face */
  .clock-container {
    position: relative;
    width: 240px;
    height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .clock-ring-bg {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid var(--border);
  }

  .clock-svg {
    position: absolute;
    inset: -8px;
    width: calc(100% + 16px);
    height: calc(100% + 16px);
    transform: rotate(-90deg);
  }

  .clock-track {
    fill: none;
    stroke: var(--border);
    stroke-width: 4;
  }

  .clock-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 753.98;
    stroke-dashoffset: 753.98;
    transition: stroke-dashoffset 0.5s linear, stroke 0.3s;
    filter: drop-shadow(0 0 8px var(--accent));
  }

  .clock-progress.warning { stroke: var(--accent3); filter: drop-shadow(0 0 8px var(--accent3)); }
  .clock-progress.danger  { stroke: var(--accent2); filter: drop-shadow(0 0 8px var(--accent2)); }

  .clock-inner {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    z-index: 2;
  }

  .clock-time {
    font-family: 'Courier New', 'SF Mono', monospace;
    font-size: 52px;
    font-weight: 300;
    letter-spacing: -2px;
    color: var(--text);
    line-height: 1;
  }

  .clock-label {
    font-family: 'Courier New', 'SF Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .clock-round {
    font-family: 'Courier New', 'SF Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-top: 4px;
  }

  /* Pulse dot when running */
  .pulse-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 var(--glow);
    animation: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .pulse-dot.active {
    opacity: 1;
    animation: pulse-ring 1.5s ease-out infinite;
  }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(0,229,176,0.5); }
    70%  { box-shadow: 0 0 0 10px rgba(0,229,176,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,229,176,0); }
  }

  /* Preset selector */
  .section-label {
    font-family: 'Courier New', 'SF Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    align-self: flex-start;
  }

  .presets {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    width: 100%;
  }

  .preset-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-user-select: none;
  }

  .preset-btn:active { transform: scale(0.95); }

  .preset-btn.selected {
    border-color: var(--accent);
    background: rgba(0,229,176,0.08);
    box-shadow: 0 0 20px rgba(0,229,176,0.1);
  }

  .preset-min {
    font-family: 'Courier New', 'SF Mono', monospace;
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    line-height: 1;
  }

  .preset-btn.selected .preset-min { color: var(--accent); }

  .preset-unit {
    font-family: 'Courier New', 'SF Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* Custom time */
  .custom-row {
    width: 100%;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .custom-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'Courier New', 'SF Mono', monospace;
    font-size: 20px;
    color: var(--text);
    text-align: center;
    -webkit-appearance: none;
    outline: none;
    transition: border-color 0.2s;
  }

  .custom-input:focus { border-color: var(--accent); }

  .custom-unit-label {
    font-family: 'Courier New', 'SF Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  /* Repeat toggle */
  .options-row {
    width: 100%;
    display: flex;
    gap: 10px;
  }

  .option-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-user-select: none;
  }

  .option-card:active { transform: scale(0.98); }
  .option-card.active {
    border-color: var(--accent);
    background: rgba(0,229,176,0.08);
  }

  .option-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .option-name {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text-mid);
  }
  .option-card.active .option-name { color: var(--accent); }

  .toggle-pill {
    width: 32px; height: 18px;
    background: var(--border);
    border-radius: 9px;
    position: relative;
    transition: background 0.2s;
  }
  .option-card.active .toggle-pill { background: var(--accent); }

  .toggle-pill::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: white;
    transition: transform 0.2s;
  }
  .option-card.active .toggle-pill::after { transform: translateX(14px); }

  .option-desc {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* Repeat count */
  .repeat-count-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 4px;
  }

  .count-label {
    font-family: 'Courier New', 'SF Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    flex: 1;
  }

  .count-controls {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .count-btn {
    width: 40px; height: 40px;
    background: transparent;
    border: none;
    color: var(--text-mid);
    font-size: 20px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .count-btn:active { background: rgba(255,255,255,0.05); }

  .count-val {
    font-family: 'Courier New', 'SF Mono', monospace;
    font-size: 18px;
    color: var(--text);
    min-width: 44px;
    text-align: center;
  }

  /* Controls */
  .controls {
    width: 100%;
    display: flex;
    gap: 12px;
  }

  .btn-main {
    flex: 1;
    height: 60px;
    border-radius: 16px;
    border: none;
    font-family: 'Courier New', 'SF Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-user-select: none;
  }

  .btn-main:active { transform: scale(0.97); }

  .btn-start {
    background: var(--accent);
    color: #0a0a0f;
    box-shadow: 0 0 30px rgba(0,229,176,0.3);
  }
  .btn-start:hover { box-shadow: 0 0 40px rgba(0,229,176,0.45); }

  .btn-pause {
    background: var(--accent3);
    color: #0a0a0f;
    box-shadow: 0 0 30px rgba(255,217,61,0.25);
  }

  .btn-reset {
    width: 60px; height: 60px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-mid);
    font-size: 22px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    -webkit-user-select: none;
    flex-shrink: 0;
  }
  .btn-reset:active { transform: scale(0.95); background: rgba(255,107,107,0.1); border-color: var(--accent2); color: var(--accent2); }

  /* Log */
  .log-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .log-clear {
    font-family: 'Courier New', 'SF Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    padding: 4px;
  }
  .log-clear:active { color: var(--accent2); }

  .log-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 140px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .log-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .log-round {
    font-family: 'Courier New', 'SF Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .log-time {
    font-family: 'Courier New', 'SF Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* Notification permission banner */
  .notif-banner {
    width: 100%;
    background: rgba(255,217,61,0.08);
    border: 1px solid rgba(255,217,61,0.25);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--accent3);
    cursor: pointer;
    transition: all 0.2s;
  }
  .notif-banner:active { background: rgba(255,217,61,0.15); }
  .notif-banner.hidden { display: none; }

  /* Divider */
  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
  }

  /* Flash overlay */
  .flash {
    position: fixed;
    inset: 0;
    background: rgba(0,229,176,0.12);
    pointer-events: none;
    opacity: 0;
    z-index: 100;
    transition: opacity 0.1s;
  }
  .flash.active { opacity: 1; }
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<div class="container">
  <div class="header">
    <span class="header-label">INTERVAL</span>
    <h1 class="header-title">タイマー</h1>
  </div>

  <!-- Notification banner -->
  <div class="notif-banner" id="notifBanner" onclick="requestNotifPermission()">
    <span>🔔</span>
    <span>通知を有効にするとバックグラウンドでも動作します</span>
  </div>

  <!-- Clock -->
  <div class="clock-container">
    <div class="clock-ring-bg"></div>
    <svg class="clock-svg" viewBox="0 0 272 272">
      <circle class="clock-track"    cx="136" cy="136" r="120"/>
      <circle class="clock-progress" cx="136" cy="136" r="120" id="progressRing"/>
    </svg>
    <div class="clock-inner">
      <div class="pulse-dot" id="pulseDot"></div>
      <div class="clock-time" id="clockDisplay">00:00</div>
      <div class="clock-label" id="clockLabel">準備中</div>
      <div class="clock-round" id="clockRound"></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn-main btn-start" id="mainBtn" onclick="toggleTimer()">START</button>
    <button class="btn-reset" onclick="resetTimer()">↺</button>
  </div>

  <div class="divider"></div>

  <!-- Presets -->
  <span class="section-label">プリセット</span>
  <div class="presets">
    <button class="preset-btn" onclick="selectPreset(5)"   data-min="5" >
      <span class="preset-min">5</span><span class="preset-unit">分</span>
    </button>
    <button class="preset-btn" onclick="selectPreset(10)"  data-min="10">
      <span class="preset-min">10</span><span class="preset-unit">分</span>
    </button>
    <button class="preset-btn" onclick="selectPreset(15)"  data-min="15">
      <span class="preset-min">15</span><span class="preset-unit">分</span>
    </button>
    <button class="preset-btn" onclick="selectPreset(25)"  data-min="25">
      <span class="preset-min">25</span><span class="preset-unit">分</span>
    </button>
    <button class="preset-btn" onclick="selectPreset(60)"  data-min="60">
      <span class="preset-min">60</span><span class="preset-unit">分</span>
    </button>
  </div>

  <!-- Custom -->
  <span class="section-label">カスタム時間</span>
  <div class="custom-row">
    <input class="custom-input" type="number" id="customMin" placeholder="15" min="1" max="999"
           oninput="onCustomInput()" inputmode="numeric">
    <span class="custom-unit-label">MIN</span>
  </div>

  <div class="divider"></div>

  <!-- Options -->
  <span class="section-label">オプション</span>
  <div class="options-row">
    <div class="option-card active" id="repeatCard" onclick="toggleRepeat()">
      <div class="option-top">
        <span class="option-name">繰り返し</span>
        <div class="toggle-pill" id="repeatToggle"></div>
      </div>
      <span class="option-desc">自動で繰り返す</span>
    </div>
    <div class="option-card active" id="soundCard" onclick="toggleSound()">
      <div class="option-top">
        <span class="option-name">サウンド</span>
        <div class="toggle-pill" id="soundToggle"></div>
      </div>
      <span class="option-desc">音で通知する</span>
    </div>
  </div>

  <div class="repeat-count-row" id="repeatCountRow">
    <span class="count-label">繰り返し回数</span>
    <div class="count-controls">
      <button class="count-btn" onclick="adjustCount(-1)">−</button>
      <span class="count-val" id="countVal">∞</span>
      <button class="count-btn" onclick="adjustCount(1)">＋</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Log -->
  <div class="log-section">
    <div class="log-header">
      <span class="section-label">履歴</span>
      <button class="log-clear" onclick="clearLog()">クリア</button>
    </div>
    <div class="log-list" id="logList">
      <!-- filled by JS -->
    </div>
  </div>

</div>

<script>
// ── State ──────────────────────────────────────────────
let intervalMinutes = 5;
let totalSeconds    = 0;
let remainingSeconds = 0;
let timerInterval  = null;
let isRunning      = false;
let currentRound   = 0;
let maxRounds      = 0;   // 0 = infinite
let repeatEnabled  = true;
let soundEnabled   = true;
let repeatCount    = 0;   // 0 = infinite
const CIRCUMFERENCE = 2 * Math.PI * 120;  // 753.98

// ── Audio (iOS Safari対応) ────────────────────────────
let audioCtx = null;
let audioReady = false;

function initAudio() {
  if (audioCtx) return audioCtx;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
    return audioCtx;
  } catch(e) { return null; }
}

// iOSはユーザー操作の中でAudioContextを作り・resumeしないと音が出ない
function unlockAudio() {
  const ctx = initAudio();
  if (!ctx || audioReady) return;
  // サイレントバッファを再生してロック解除
  try {
    const buf = ctx.createBuffer(1, 1, ctx.sampleRate);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    src.stop(ctx.currentTime + 0.001);
  } catch(e) {}
  if (ctx.state === 'suspended') {
    ctx.resume().catch(() => {});
  }
  audioReady = true;
}

// すべてのタッチ・クリックでアンロック試行
document.addEventListener('touchstart',  unlockAudio, { passive: true });
document.addEventListener('touchend',    unlockAudio, { passive: true });
document.addEventListener('click',       unlockAudio);

function playBeep(type) {
  if (!soundEnabled) return;
  const ctx = initAudio();
  if (!ctx) return;

  const doPlay = () => {
    try {
      const now = ctx.currentTime;
      const notes = type === 'tick'
        ? [{ f: 880, t: 0,    d: 0.08, v: 0.3 }]
        : [
            { f: 880,  t: 0,    d: 0.15, v: 0.5 },
            { f: 1108, t: 0.18, d: 0.15, v: 0.45 },
            { f: 1320, t: 0.38, d: 0.25, v: 0.4 },
          ];
      notes.forEach(({ f, t, d, v }) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = f;
        gain.gain.setValueAtTime(0, now + t);
        gain.gain.linearRampToValueAtTime(v,     now + t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, now + t + d);
        osc.start(now + t);
        osc.stop(now + t + d + 0.05);
      });
    } catch(e) {}
  };

  if (ctx.state === 'suspended') {
    ctx.resume().then(doPlay).catch(() => {});
  } else {
    doPlay();
  }
}

// ── Vibration ──────────────────────────────────────────
function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

// ── Notifications ──────────────────────────────────────
async function requestNotifPermission() {
  try {
    if (!('Notification' in window)) return;
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      document.getElementById('notifBanner').classList.add('hidden');
    }
  } catch(e) {}
}

function sendNotification(round) {
  try {
    if (typeof Notification === 'undefined') return;
    if (Notification.permission !== 'granted') return;
    new Notification('タイマー完了！', {
      body: `ラウンド ${round} 完了 🎉`,
      silent: false,
    });
  } catch(e) {}
}

// ── Preset / custom ────────────────────────────────────
function selectPreset(min) {
  intervalMinutes = min;
  document.getElementById('customMin').value = '';
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.min) === min);
  });
  if (!isRunning) resetDisplay();
}

function onCustomInput() {
  const val = parseInt(document.getElementById('customMin').value);
  if (!isNaN(val) && val > 0) {
    intervalMinutes = val;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('selected'));
    if (!isRunning) resetDisplay();
  }
}

// Select default
selectPreset(5);

// ── Options ────────────────────────────────────────────
function toggleRepeat() {
  repeatEnabled = !repeatEnabled;
  document.getElementById('repeatCard').classList.toggle('active', repeatEnabled);
  document.getElementById('repeatCountRow').style.display = repeatEnabled ? '' : 'none';
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundCard').classList.toggle('active', soundEnabled);
  if (soundEnabled) { unlockAudio(); setTimeout(() => playBeep('tick'), 100); }
}

function adjustCount(delta) {
  repeatCount = Math.max(0, repeatCount + delta);
  document.getElementById('countVal').textContent = repeatCount === 0 ? '∞' : repeatCount;
}

// ── Display ────────────────────────────────────────────
function formatTime(s) {
  const m = Math.floor(s / 60);
  const ss = s % 60;
  return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

function updateDisplay() {
  document.getElementById('clockDisplay').textContent = formatTime(remainingSeconds);
  const frac = totalSeconds > 0 ? remainingSeconds / totalSeconds : 1;
  const offset = CIRCUMFERENCE * (1 - frac);
  const ring = document.getElementById('progressRing');
  ring.style.strokeDashoffset = offset;

  // Color
  ring.classList.remove('warning','danger');
  if (frac <= 0.1) ring.classList.add('danger');
  else if (frac <= 0.25) ring.classList.add('warning');
}

function resetDisplay() {
  totalSeconds = remainingSeconds = intervalMinutes * 60;
  updateDisplay();
  document.getElementById('clockLabel').textContent = '準備中';
  document.getElementById('clockRound').textContent = '';
  document.getElementById('pulseDot').classList.remove('active');
  document.getElementById('mainBtn').textContent = 'START';
  document.getElementById('mainBtn').className = 'btn-main btn-start';
}

// ── Timer logic ────────────────────────────────────────
function toggleTimer() {
  if (isRunning) {
    pauseTimer();
  } else {
    startTimer();
  }
}

function startTimer() {
  unlockAudio();

  isRunning = true;
  if (remainingSeconds <= 0) {
    remainingSeconds = intervalMinutes * 60;
    totalSeconds = remainingSeconds;
    currentRound = 0;
  }
  if (totalSeconds === 0) { totalSeconds = remainingSeconds; }

  currentRound = currentRound || 1;
  document.getElementById('clockLabel').textContent = '実行中';
  document.getElementById('clockRound').textContent = `ROUND ${currentRound}`;
  document.getElementById('pulseDot').classList.add('active');
  document.getElementById('mainBtn').textContent = 'PAUSE';
  document.getElementById('mainBtn').className = 'btn-main btn-pause';

  timerInterval = setInterval(() => {
    remainingSeconds--;
    updateDisplay();

    if (remainingSeconds <= 0) {
      onRoundComplete();
    }
  }, 1000);
}

function pauseTimer() {
  isRunning = false;
  clearInterval(timerInterval);
  document.getElementById('clockLabel').textContent = '一時停止';
  document.getElementById('pulseDot').classList.remove('active');
  document.getElementById('mainBtn').textContent = 'START';
  document.getElementById('mainBtn').className = 'btn-main btn-start';
}

function resetTimer() {
  isRunning = false;
  clearInterval(timerInterval);
  currentRound = 0;
  resetDisplay();
}

function onRoundComplete() {
  clearInterval(timerInterval);
  timerInterval = null;

  // Effects
  playBeep('end');
  vibrate([200, 100, 200, 100, 400]);
  sendNotification(currentRound);
  flashScreen();

  // Log
  addLog(currentRound, intervalMinutes);

  // Check if we should repeat
  const shouldRepeat = repeatEnabled && (repeatCount === 0 || currentRound < repeatCount);

  if (shouldRepeat) {
    currentRound++;
    remainingSeconds = intervalMinutes * 60;
    totalSeconds = remainingSeconds;
    updateDisplay();
    document.getElementById('clockRound').textContent = `ROUND ${currentRound}`;
    setTimeout(() => {
      if (!isRunning) {
        isRunning = true;
        document.getElementById('clockLabel').textContent = '実行中';
        document.getElementById('pulseDot').classList.add('active');
        document.getElementById('mainBtn').textContent = 'PAUSE';
        document.getElementById('mainBtn').className = 'btn-main btn-pause';
        timerInterval = setInterval(() => {
          remainingSeconds--;
          updateDisplay();
          if (remainingSeconds <= 0) onRoundComplete();
        }, 1000);
      }
    }, 1500);
  } else {
    isRunning = false;
    document.getElementById('clockLabel').textContent = '完了！';
    document.getElementById('pulseDot').classList.remove('active');
    document.getElementById('mainBtn').textContent = 'START';
    document.getElementById('mainBtn').className = 'btn-main btn-start';
    document.getElementById('clockRound').textContent = '全ラウンド完了 🎉';
    remainingSeconds = 0;
    updateDisplay();
  }
}

function flashScreen() {
  const el = document.getElementById('flash');
  el.classList.add('active');
  setTimeout(() => el.classList.remove('active'), 200);
}

// ── Log ────────────────────────────────────────────────
let logs = [];

function addLog(round, min) {
  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  logs.unshift({ round, min, time: timeStr });
  renderLog();
}

function renderLog() {
  const container = document.getElementById('logList');
  if (logs.length === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = logs.map(l => `
    <div class="log-item">
      <span class="log-round">ROUND ${l.round} · ${l.min}分</span>
      <span class="log-time">${l.time}</span>
    </div>
  `).join('');
}

function clearLog() {
  logs = [];
  renderLog();
}

// ── Notification check on load ─────────────────────────
try {
  if (typeof Notification === 'undefined' || !('Notification' in window)) {
    document.getElementById('notifBanner').classList.add('hidden');
  } else if (Notification.permission === 'granted') {
    document.getElementById('notifBanner').classList.add('hidden');
  }
} catch(e) {
  document.getElementById('notifBanner').classList.add('hidden');
}

// ── Initial display ────────────────────────────────────
resetDisplay();
</script>
</body>
